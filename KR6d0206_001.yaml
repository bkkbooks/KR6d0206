body:
  text: 南嶽大師撰凡是一切新發心菩薩欲學六波羅蜜欲修一切禪定欲行三十七品若欲說法教化衆生學大慈悲起六神通欲得疾入菩薩位得佛智慧先當具足念佛三昧般舟三昧及學妙法蓮華三昧是諸菩薩最初應先學隨自意三昧此三昧若成就得首楞嚴定隨自意三昧者先以大悲眼觀衆生舉足下足具六波羅蜜菩薩行時先觀衆生起一子想亦如幻化如影如空不可得想而自舉身作輕空想觀地而行如履虗空自令己身不曲不直己身直行不遲不疾亦不左右𮨇視又不轉頭及望若欲望時舉身皆轉如象王視步步進時觀衆生勿令損傷是時衆生即大歡喜心無恐怖無所復畏是時名為檀波羅蜜名無畏施問曰檀波羅蜜者云何有三種施一者飲食二者財寶三者說法飲食布施增長壽命衣服布施能遮寒熱醫藥布施能除患苦說法布施能破邪見增長慧命得三乘果施者受者飲食財寶三事俱空無自無他無所得故名檀波羅蜜問曰是菩薩行時舉足下足於諸衆生空無所得有何利益而言具足六波羅蜜答曰財食等施增長凡夫生死身命醫藥等法但除外小病不能除衆生生死怖畏聽法之時或有記心或無記心或有漏心或無漏心未必皆善是時施主或有我所或無我所或是波羅蜜或非波羅蜜隨自意三昧中菩薩行時以輕空身如影夢化以大悲眼觀衆生亦不著衆生想亦不著無衆生想是時衆生見菩薩威儀容貌端直而作是念是人慈悲護念我等即解菩薩意離一切怖畏大歡喜故即發菩提心衆生是時發菩提心不名有記不名無記不名有漏不名無漏不得我所不得無我所即得無生智云何而言非波羅蜜菩薩行時衆生歡喜無所畏故善攝行威儀無傷損故此即是施衆生命不得己身不得衆生亦不得威儀想無所得故此豈非是檀波羅蜜衆生見菩薩威儀解菩薩意離怨結想得無生解離煩惱結住菩薩心此豈非是除衆生病增長慧命智慧命者即是波羅蜜菩提心者盡智無生智煩惱盡故名為盡智十二因緣畢竟不生故是名無生智此即是般若波羅蜜汝云何言非波羅蜜菩薩行時以無畏施利益衆生名檀波羅蜜於諸衆生無所損傷離罪福想名尸波羅蜜菩薩行時心想不起亦不動搖無有住處十八界一切法不動故名為羼提波羅蜜具足忍辱故菩薩行時不得舉足下足心無前思後覺無生滅一切法中無動無住是名精進毗梨耶波羅蜜菩薩行時不得身心一切法中無受念著不得生死不得涅槃不得中道故一切法中不亂不味離定亂想故是名禪波羅蜜具足能起諸神通故菩薩行時頭等六分如空如影如夢化炎無有生滅亦無斷常無兩中間三毒四大五陰十二入十八界十二因緣畢竟空無所得既無繫縛亦無解脫是名般若波羅蜜智慧具足是故菩薩行威儀舉足下足念念具足六波羅蜜問曰此義出何經中耶答曰出首楞嚴經中有衆生得聞首楞嚴名勝得四禪四空定問曰汝向說新發意菩薩學隨自意三昧若得成就是時名為首楞嚴定我今不解首楞嚴定云何菩薩行威儀中舉足動步而常入定具足一切諸波羅蜜唯願仁者為我解說答曰汝當諦聽善思念之吾當為汝略說此義菩薩行時未舉足欲舉足未生念欲生念先觀未念欲念心未起念時無有心想亦無心心數法是名心性是心性無有生滅無明無暗無空無假不斷不常無相貌無所得故是名心性亦名自性清淨心是自性清淨心者是涅槃不能覺了者即是生死妄念思想未生時是時畢竟無心者名為無始求自性清淨無始心畢竟空寂名為能破衆生是故佛言無始空破衆生畢竟空破諸法無始空破未念心畢竟空破欲念心是無始空破無始無明畢竟空破有始無明問曰汝向者說無始空破衆生無始空者既是性空諸法若性自空即無有和合云何有衆生可破答曰是假名和合虗妄顛倒非是實衆生實衆生者名為心性夫心性者無有生死亦無解脫一切衆生無始來受故倒觀本源無始亦空無始空者是名性空性空者是真實衆生真實衆生無有生死衆生若能解即是無生智爾時生死即是涅槃更不別有涅槃之法是故佛言衆生涅槃本自有之非適今也以是義故新學菩薩欲行時觀未念心不可得問曰未念心滅欲念心生未念心不滅欲念心生答曰未念心滅竟欲念心生難曰汝未念心既滅欲念心從何生汝若未念心滅欲念心生是事不然何以故未念心既滅名為斷盡者名為死滅若未念心盡滅以欲念心自生者便是兩心各不相知心不能自知心如指不自觸指心亦如是汝若一心即無前後復墮常中汝若二心生滅各異復墮斷中未念念心常亦無此理斷亦無此理欲念心亦然如汝向者答我未念心滅竟欲念心生者便是兩心若有兩心即有兩神便是邪見何以故若有兩神唯一有衆生即有兩衆生即是外道義兩神若前後亦不可若一時亦不可若兩神共合作一亦不可若一能作兩亦不可皆是外道義何以故般若經中一切衆生畢竟不相續一切法亦不相續若心及一切不相續云何有斷前滅後生若前滅後生者即不相知云何令人憶一生來事念持不忘汝若一念中知便應忘一切事各滅壞若心常住不變易者亦不能知一切法何以故無前因後果故常亦無因果斷亦無因果亦無罪福復無業報瓦石無異皆是外道義也是故佛法中衆生心性不斷不常畢竟不相續無心無無心汝未念心若不滅欲念心自生是亦不然何以故無一斷一常故亦無前常後斷故若未念心不滅欲念心不生無兩常並故是事不然若前念非不滅後念非不生是事亦不然何以故若得非滅可得非不滅既無非滅即無非不滅若得不生可得非不生既無非生云何見非不生非不不不滅非不不不生亦如是皆不可得亦無是不可得觀菩薩既不得未念心生滅斷常即無無明亦不得欲念心無諸行是故明與無明其性無二智者了達凡夫謂二明與無明雖無有二亦非是一是故菩薩行時舉足下足與念念心足不自知足亦不自知行與不行亦不自知履地不履地亦不自知隨道不隨道地亦復無是念此菩薩履我上行不履我上行虗空亦無是念是菩薩於我中過不過亦不自知是虗空非虗空菩薩心數畢竟不生亦無不生之想不在內不在外亦不在中間亦不在餘處亦無不在從旦涉路行至暮無有動想復無不動想亦無所經由而善了知歷涉之處雖無去者而有所到雖無受者而得果報如虗空中雲雖無心想而能降雨雖無主我能遍方所遠望即見近觀即無推尋此雲本無生處能令衆生虗妄見有往還所起出無分散還無積聚不能自生亦不從他生山石無念我能生雲及以不生雲亦無念我從山出不從山出各不相知諸法亦爾衆生此身猶如浮雲生時空生滅時空滅雖空能見善惡造罪衆生如雲雨雹傷害五穀及殺人畜衆生亦爾是身雖空行十惡者失人天報墮在三途如雹傷穀行有漏善者失三乘道如殺人畜人者喻佛畜獸者喻緣覺聲聞衆生亦爾身心雖空行有漏業善惡果報如天雨雹若有持戒修福禪定道品次第聖行智慧神通及化衆生如彼好雲農時要月興致甘雨五穀豐熟華茂盛人獸快樂衆生亦爾身心雖空持戒清淨修禪道品次第聖行三界傍報五戒十善及有漏禪人天快樂如五穀成熟無漏禪定聖行道品智慧神通譬如樹木華果茂盛大慈悲雲實相法雨雨於人華各得成實人者佛道具足獸者喻緣覺聲聞三乘聖果上中下別皆因持戒行善修禪獲得此報破戒之人終不能得持戒雖皆是空業報各別如涅槃中說有二種果色味相似一名迦羅迦果食者命終復有一果名鎮頭迦食者長命得力得色增壽益算破戒之人如迦羅迦果持戒之人如鎮頭迦果身心雖空果報不失菩薩行時身心無定無亂亦能覺了一切衆事覺及所覺俱不可得無有諸大陰界入衆魔群盜不得入是故名為首楞嚴定從初發心終至佛果一切聖行皆如隨自意三昧無初發心無果可至亦不失因果因果雖在亦無受者雖無受者果不敗亡雖不敗亡亦無處所何以故因空故無有作果空故無有想因之與果正是一空更無別空觀此空法無空可得是名空空一切皆空名為大空不失因果名為中道第一義空菩薩觀察生死諸行及修道聖行一切皆是第一義空是故佛言衆生性即菩提菩提性即衆生菩提衆生無一二知如此名世尊菩薩行時觀此身心一切威儀無行無住無坐無臥無起無立亦無去無來無出無沒無生無滅亦無一切陰界諸入是故維摩經云法無去來常不住故諸法不有亦不無以因緣故諸法生因者即是無明緣者即是諸行是故佛言因眼見色因心思覺生貪愛心愛者即是無明為愛造業名之為行若能反流觀無明源及心性空思愛亦空無業無行即無諸法生無緣和故一切諸法本因緣空無主覺此盡本源故稱真沙門亦名無生忍復名無起法忍菩薩觀色心無垢無淨不動不變猶如虗空無想可得名之為空亦非是空何以故衆生此身頭等六分假名色身本由一念妄念心生隨業受報天人諸趣猶如化生夢幻之體亦不可得菩薩既知妄念心空即無妄念非是空假色身亦爾如影如空求不可得是故佛言衆生色身此色身生時但空生滅時亦空滅頻婆娑羅王聞佛說此得第三果次第即得無生法忍智是故般若經中曇無竭菩薩語薩陀波崙言法無來無去空法即是佛無相法無生空法無滅法亦如是無來無去即佛從無住法亦如是既無有住亦無來無去是故菩薩行威儀中觀此未念及欲念心性自清淨無有動變故得不動三昧發一切智慧解一切佛法從初發心終至佛果未曾動變亦不從一地至一地一念了知三世之事凡聖心想國土世界劫數遠近衆生煩惱根性差別一念盡知是名菩薩遍覺三昧亦得名為照明三昧以此三昧神通力故湛然不變色身變現十方國土隨感不同說音聲亦復如是則名為首楞嚴定力隨自意三昧具足成就住威儀品第二菩薩立時諦觀此身色之空法頭等六分如空中雲氣息出入如空中風身色虗妄如空中華云何得知息實相先觀三性後觀假名何等三性一者心性二者色性三者息性復有三性一者心性二者眼性三者意性先觀前三性若先觀心性沉細難知若先觀色性粗朴難解應先觀息是息由心遍色處中易知何以故先觀息實然後觀息遍身還歸實相所以者何若先觀有即受念著顛倒難遣是故新學菩薩先觀息實相觀其出入是息出時從何處生相貌何似根源何處求之不得無源無生都無處所復觀入息從何方來入至何處諦觀此息來無方所入無所至無來即是無生無至即是無滅入息既無生滅中間亦無相貌無能知者亦無見者知此入息因如虗空由入有出入者既無出者亦然知出入息畢竟空寂空是息不能自生心念即息動無念即息盡是息由心故有生滅心即是主諦觀此心今在何處身內觀察從頭至足從皮至髓一一諦觀都不見心內若無心在外有也復觀身外諸方遠近四維上下及以中間一一觀察都不見心諸方既無可在中間搖動出入遍身外中間悉觀亦不見心誰能觀心復無觀者是心既無相貌名字亦無是名觀心實相若心與息俱無名相我今色身從何處生誰之所作諦審觀察責身源由是身無主從妄念心生因息得立心息既空身亦寂滅常修此定深澄空法離諸假名知一切空具足正見無復妄念然後觀息遍身出入先觀鼻中氣息往還入出次觀遍身從頭至足從皮至髓毛孔汗垢氣息一時微細出入審諦觀察明了見之觀此色身五相次第歸空寂滅第一相者初觀此身皮肉筋骨猶如芭蕉從皮至髓氣息一時入出無礙觀此氣息入無積聚出無分散一色芭蕉觀第二相者次觀身分芭蕉之觀轉虗空明淨猶如聚沫名為水沫觀第三相者觀此沫觀一切身分轉空明淨如水上泡名為泡觀第四觀相者觀此泡觀轉空微薄猶如泡影名為影觀第五相者觀此影觀一切身分不見相貌猶如虗空名虗空觀菩薩具足五種明觀一切身分如空中華譬如世間於虗空中見有一華不依壚壁不依林藪忽爾化生遠望即見近觀即無愚人不了謂實有華智者覺了本來無華衆生色身如虗空華畢竟空寂無生無滅菩薩觀身如空中立亦復如是菩薩爾時自觀此身如淨琉璃空無所有以此觀法利益衆生增長法身名為檀波羅蜜為法施菩薩立時以此觀法引導衆生令諸衆生見菩薩形發歡喜心具清淨戒離罪福相是名菩薩持戒尸羅波羅蜜菩薩立時知此身中六情無主亦知身外六塵無形亦知中間六識無相是身空寂無十八界一切陰界及心本性畢竟空寂無有生滅世間八法不能令動故名為菩薩忍辱羼提波羅蜜世八法者利衰毀譽苦樂稱譏菩薩立時一切心相無生住滅一切法不住前際不住後際不住中際無三際故既無生際即無住際亦無滅際一切法中雖無去住而大精進身心無倦自利利他是名菩薩具足精進毗梨耶菩薩立時不見內心立不見外心立不見內外心立色身空寂亦無立相諸陰亦然於一切法中不味著無定無亂畢竟空故入不動三昧普現法界一切色身饒益衆生是名菩薩具足禪波羅蜜菩薩立時知此色身無自無他如鏡中像如炎如化夢如幻無有壽命亦無我人無衆生滅亦無隱顯復無出沒諸法自爾無取無捨覺了一切衆生根性隨感差別是名般若波羅蜜具足智慧神通藏故坐威儀品第三四種身威儀中坐最為安隱菩薩常應跏趺端坐不動深入一切諸三昧門觀察一切衆生根性欲安立之令得解脫是故菩薩常入禪定起六神通能淨五眼肉眼清淨天眼通達慧眼見真法眼觀察佛眼覺了一切能度十方世界無量衆生不前不後一時得道是故菩薩常在禪定問曰菩薩何故四種身儀中多在坐威儀餘法亦應得獨言跏趺坐答曰此是坐禪入道之人坐禪之法餘威儀中取道則難多有動散結跏趺坐心直身正斂念在前復欲教諸弟子入禪定是故菩薩結跏趺坐餘坐法者是凡夫人坐法動散心多不得入定其心難攝結跏趺坐身心正直心易攝故欲教弟子學此坐法捨諸外道邪見威儀有諸外道顛狂心亂或常翹腳或傍身欹足或一足獨立或五熱炙身以是種種邪見身心不安菩薩坐時令諸衆生見者歡喜發菩提心離諸怖畏入菩薩位是名法施檀波羅蜜菩薩坐時身心不動衆生見者能發淨信離殺害心捨諸惡業具足大乘菩薩律行是名持戒尸波羅蜜菩薩坐時知一切法陰界諸入畢竟不動能令衆生離高下心不起諍論是名忍辱羼提波羅蜜菩薩坐時能令衆生見者歡喜捨十惡業行行十善道修脫勇猛精進身心不懈具足精進毗利耶波羅蜜菩薩坐時能令衆生捨離味著能斷貪愛心無定亂畢竟寂滅亦令衆生起神通力何以故是諸衆生見菩薩坐禪深心愛樂情無捨離譬如往昔雪山林中有一仙人坐禪入定是時亦有無量外道在此山中邪見苦行翹腳散足或一足獨立多不安穩是時復有五百獼猴山中遊行見此仙人林中禪定結跏趺坐合眼合口氣不出獼猴衆中有二老獼猴愛樂仙人學其坐禪合眼入定信心重故即得神通成辟支佛如是次第五百獼猴皆得成就辟支佛道是諸獼猴念此山中邪見外道身不安穩是老獼猴往到其所於外道前自敷草蓐結跏趺坐合眼入定是時五百獼猴捉諸外道兩腳結跏趺坐老獼猴捉諸外道兩腳結跏趺坐老獼猴示諸外道各以手指捻外道眼令合如坐禪法五百外道各生慚愧此坐安穩身不欹側是道無疑各作是念此諸獼猴必見聖人得其道迹復來教我信心殷重是老獼猴見諸外道信心決定即現神通種種變化五百獼猴各現神變外道見已心生歡喜心勇即發神通成辟支佛坐禪威儀能令畜生及諸外道信心歡喜成辟支佛天人六趣諸衆生等愛樂菩薩坐禪威儀發菩提心得三乘道皆亦如是是名菩薩禪波羅蜜菩薩坐時知一切法其性常定知身無主無我無人是身色陰如空中月影現衆水色相寂滅不於三界現身口意法身普現十方世界實無色心往還來去示現衆生能令衆生各各感見隨應說法稱機得道如阿修羅琴不以手鼓安置空地無人之處自出種種微妙音聲能令天人所聞各各別異稱意歡樂菩薩禪定亦復如是實無覺觀係念思惟亦無色像現身口意衆生各各感應不同如空月是名菩薩禪波羅蜜菩薩坐時雖無心陰界入見於一切法皆如夢想無覺觀心具足無量一切辨才一念悉知三世九道凡聖差別思覺不同優劣差別不預思惟知過去世無礙知未來世無礙知無為無礙知世諦無礙知真諦無礙知第一義諦空無礙離常定一念遍在十方佛前現神通力種種變化供養之具供養諸佛一時變現入六道中菩薩色身對衆生機隨應說法一念受持一切佛法悉知諸佛弟子種數一念能轉法諸佛法輪盡知衆生煩惱利鈍差別成聞菩薩音聲不同能斷煩惱雖無色像陰界入諸見具足如此無量辨才是名菩薩般若波羅蜜問般若波羅蜜名何等法答曰般若波羅蜜名一切種慧三乘智慧盡到其邊是名彼岸名為摩訶般若波羅蜜問曰如是智慧從何處生答曰無有生處何以故如大品經中先尼梵志問佛世尊如來所得一切智慧從何處得佛答先尼無有得處如是智慧非內觀中得是智慧非外觀中得是智慧非內外觀中得是智慧亦非不觀得是智慧是時先尼梵志即於佛一切智中得生信解深入般若波羅蜜是故言無有得處更有人言問曰何者為內觀何者為外觀何者為內外觀云何言亦非不觀得是智慧答曰內觀者是內六根眼耳鼻舌身意外觀者是外六塵色聲香味觸法內外觀者中間六識眼識觸因緣生諸受乃至鼻舌意識觸因緣生諸受菩薩觀內六根性空無所得觀外六塵性空無所得觀中六識性空無所得若不觀察亦不能得是故佛言亦非不觀得是智慧無所得即是智即是慧所以者何大品經一心具萬行品中佛告須菩提諸法無所有性即是道即是果若於諸法中有見者此人無果壞法性故無道果是故佛言諸法無所有性即是道即是果諸法者即是衆生十八界內有六根界外有六塵界中有六識界觀內六根能破貪瞋淫恚愚凝無明調慢諸煩惱結能破自身我見及離我所無有壽命衆生主者離受念著畢竟空故是名智無所得故名之為慧觀外六塵於色塵中青黃赤白女等色是名外身起貪愛心能生煩惱菩薩爾時觀此外身修死尸想膖脹爛壞九想具足乃至十想成就歸空盡滅更不復生觀察覺了能破煩惱是名為智無所有性是名為慧聲香味觸法亦復如是觀察中識無分別想無自生處假內外因緣和合而生都無自性觀內六根空無有主觀外六塵空無形色和合想不可分別即無六識是時智慧無有得處若不坐禪明了觀察是十八界亦不能得如是智慧是故佛言亦非不觀得是智慧衆生五識但能當境能知現在五塵之事不能究竟囑當受持然此意根雖無處所遍能囑當五識之事然其意識都不曾往與五識合雖無往還能懸囑當五塵五識因緣之事雖無住處囑當五識計校思惟遠近受持皆悉不忘善惡無記亦復如是如是意根意識雖無處所亦不動搖如夢中識六能覺了總攝六根之事凡俗愚人是六種識隨緣繫縛亦不能知五根有處意根無處謂各各緣不能了知總別之想是名凡夫分張識相生死根栽非是聖慧新學菩薩用第七識剛利智觀察五陰十八界等無有集散虗妄不實無名無字無生無滅是時意根名為聖慧根者從得信根乃至慧根如是五根中說因此信慧二根力無所畏總說有二種用內能覺了破煩惱結入無間三昧得解脫智能覺一切衆生根性外能摧伏天魔外道宿命神通皆得具足發言可信實不虗謬名為信慧善轉衆生住七覺慧故名聖慧根聖名無著亦名清淨能度衆生立照為聖無著者以聖慧根覺知六根空無有主覺知六塵無色覺知六識無名無相如是三六無滅無取無捨斷一切受故名無著雖知己身及外衆生諸法實相亦能生知衆生根性是故名聖得陰界實相捨一切著故名無著若無愛著即無染纍了知諸法自性清淨畢竟寂然諸法者是十二入十八界妄念心凡夫不了能作生死無衆宋結集遍行六趣是名衆生菩薩以此聖慧根力善教道之令諸衆生同證聖慧故言清淨能度衆生為天人作教師故名阿闍梨阿者名一得一切法從初不生亦無有滅是名自覺名之為阿闍者是衆生菩薩能以一相聖慧覺說衆生令得解脫是故名闍以此自覺覺他無上慧阿二事留名後代衆生所歸永劫不絶是故名梨是故佛言衆生性即菩提性菩提性即衆生性菩提衆生無二知如此作天人師凡夫六根聖人六根是凡聖根無一無二不覺是凡夫覺了是聖人生死煩惱根即是聖慧根凡夫醜陋不淨身即是相好妙法身菩薩爾時觀此眼根作是念何者是眼云何名根作是觀時知此眼根無主若空無主即無眼根求根不得亦無有眼但以虗妄所見青黃赤白種種諸色貪愛念故名之為眼無眼故不了如向諦觀知無根情若無眼即無情識既空無主無分別者亦無虗妄種種諸色各各不相知故亦無和合畢竟寂滅空無所有如是觀竟亦無能觀法無所得故無眼無眼名字是為眼無作解脫門亦得名為無縛何以故既無繫縛誰解脫者是時無根無色塵既無根塵亦無有識是故名為無眼無分別者復次耳根聞聲菩薩爾時諦觀此耳誰能聞耳根聞耶耳識聞耶聲能自聞為用意識聞如是觀已非耳根聞非耳識聞亦非聲自聞意識亦不能自聞何以故耳根無覺知故不能聞若耳根能聞聾人應能聞聲聾人不聞故當知耳根不能聞耳識一念不能分別一故亦不能聞是聲無根故不能自覺亦不能聞意識亦不能聞衆緣和合乃得聞聲所以者何先耳聲相對然後意識生與耳合故則能分別音聲一一觀察空無聞者若無根聞即無有識根不往受聲不來入各不相知亦不相見聲如空響無生無相耳無根無識畢竟空故無耳無耳名字耳解脫門既無縛者亦無解脫凡夫不了謂我能聞是故名為聞聞新學菩薩斷一切受得薩婆若證實相慧門得音聲忍無取無捨名為聞亦名不聞聞得性空智亦得名為不聞不聞略說耳根其義如此復次鼻聞香者誰能聞觀此所臰香從何方來何處生也入至何處受者是誰相貌何似如此觀時知是香觸無所從來入無所至亦無受者復無相貌不可分別空無所有鼻無根無識無臰無香亦無名字鼻解脫門既無縛者亦無解脫亦善通達一切衆香舌嗜味者諦觀此味從何所來何方所生入至何處誰受味也相貌何似唇受味也齒受味也舌受味也咽受味也如是觀時了知此無所從來亦無所至復無住處亦無受者無生無滅亦無相貌無舌無味無根無識亦無名字舌解脫門既無縛者亦無解脫亦能善知一切味相身受觸者男女衆事細滑痛癢粗澀冷暖輕重堅柔如是等觸能生貪愛瞋喜等事衆生為此乃至失命不知慚愧為此輪轉六道生死新學菩薩諦觀此觸從何處生由愛因緣我若不拔如是愛根必當生惱身心惱故名之為苦因緣生故無常不自在故無我虗妄故無實無實故空諦觀此身無常苦空無我不淨從頭至足薄皮縛纏褁內有肌肉筋骨髓𮪱血脉屎尿肝膽腸𦝩蟲疽膿血種種不淨充滿身中凡夫不知謂是好物忽爾無當命盡死去膖脹爛壞蟲散離散頭腳異處白骨在地風吹日炙火燒作炭散滅歸空無我無人無衆生相無壽命亦無生滅猶如虗空是名鈍根壞色歸空若利根人諦觀此身色性自性空非色滅空何以故我今此身本從一念心生妄念之心無形無色無有方所猶若虗空心亦如是空無相貌知心寂滅身亦無主生如浮雲生滅如雲散滅粗觀如此若細觀者我今此身猶如雲影如雲空中行地上見影實無能有見此身亦如是幻化難了別空雲是行東雲影是人身雲散影即無東盡人亦然是身本無體無色亦無形行東及身影本來常寂然如此觀時無身無身名字是名身無作解脫門既無縛者亦無解脫知身如此亦能善解一切諸觸無所得故言法者一善二不善三者無記今欲觀察意觸法者當以非善門非不善門非無記門破前虗妄執著善不善無記等無明新學菩薩應先觀察意觸諸法問曰餘五根皆有處所眼耳鼻舌身有可見處今此意識相貌何似住在何處為當在內為當在外為在中間為在五藏為何所似名意識答曰非五根非五識非內外非中間亦不在餘處何以故五藏對五根五根對五塵根塵合生五識今此意根都無處所復無相貌而能記物何以故譬如有人臥眠熟時無情塵識而能夢見陰界諸入乃至覺時猶故不忘觀察此夢都無方所亦無住處無色無形而能物如睡眠夢乃至覺時觀不見夢主及不見所夢陰界數重都不可得而復不忘意亦如是雖復不在五藏五情五塵五識五觸五受雖不在此三十事中而能鑒照三十數重善惡無記亦不在三十事外所以者何五根不相知意根即不爾亦在亦不在云何亦在亦不在若意識不導五識不成不能分別是故不得言不在五識如人有病聾盲齆啞及身舌頑疵意識是時於五識中無用不得言在問曰上耳根義中說意識但能識過去五塵不得識現在五塵若如此者與今義相違所以者何若意識導五識能識五塵者即是現在義云何而言不識現在五塵答曰過去有二種一者過去過去二者現在過去過去過去者是遠過去現在過去者是近過去一念心中前思後覺譬如行者到法師所聽法時忽爾初聞說法之聲名之為思憶念分別名之為覺初聞說法未解語意名現在塵憶念法師語分別中事名之為覺名現在義前思是耳識後覺是意識更有一解義則不然初聞聲未能思惟是耳識思惟分別是意識問曰耳分別聲意分別法云何言耳但能聞不能分別答曰此所言者當根說義耳分別聲者意識合用非耳獨能如人思惟觀行之時傍邊人喚意識不照聲耳則不能聞聲云何得如昔二年少比丘常修禪觀有一老比丘是二年少比丘初出家時師喚二弟子在一房中坐床上噉飲食復有比丘床前坐喻噉飲住牀上一比丘思惟觀察地上比丘是時有師隔一人坐喚觀行比丘大喚五聲耳都不聞其師喚聲是故得知意識不照耳不聞聲云何而言耳獨能聞聲更有一谷有諸人等在講法衆中坐意識專觀往昔衆事亦復覺現在外緣乃至下講都不曾聞法師語聲以是定知意不屬當耳不聞聲問曰昔有一人禪定寂默耳聞遠近種種音色一時歷歷不相雜亂復有一人坐定定寂默都不聞聲此二種人各入何定聞異答曰坐禪寂默聞一切聲一時能聞不雜亂者有二種人一種人未能甚深禪定始入初禪住一念前名為微細寂靜一心但聞住處城隍內外遠近數里種種音聲不能遠聞諸方國土二種人者是人得入甚深禪定得天耳通能聞小千國土一切音聲乃至二千國土三千大千國土一切音聲亦聞十方一切音聲若復有人禪定寂默不能聞一切聲者亦有二種人一種人者未得禪定初禪前得細住心名曰住觸不自覺知猶如眠熟不夢之人此是魔鬼𨳲其心識狀似禪定都不自知入時不覺至出乃知心識問何處去更有一種人禪定不聞一切聲者此人薄禪罪重入死心定此非好禪此是障道定其人頑癡自謂我今得寂滅涅槃亦復名為滅盡定此非涅槃道設使經劫住是禪中不盡道法名障道罪亦名魔鬼奪其識去魔力持之狀似禪定更有一種人禪定默然不聞一切諸道音聲者此人名為自在禪定欲聞十方一切音聲即時得聞意不欲聞即不能聞是故名為自在禪定亦得名為日入三昧何以故昔日佛在田中阿蘭若處林中禪定近邊田中耕者二人持中有四時天風雨𮦷地動四牛二人一時怖死佛不聞也佛答言我不聞聲其人重問佛入無心定也答言不入無心定其人復問若有心識云何不聞佛答人言我有心識恆無妄念我時故入日三昧不取音聲是故不聞譬如日入一切不照我亦如是是名菩薩自在禪定復如舍利弗山中禪定值毗舍闍鬼將領諸鬼山中遊行時舍利弗斷其路坐礙不得過毗舍闍鬼即大瞋恚以金剛杵盡力極打舍利弗頭振動三千大千世界時舍利弗不覺不知從定出時覺頭皮多少異常起來問佛世尊我今頭皮多少異常佛言毗舍闍鬼以金剛杵極力打汝頭振動三千大千國土值汝入定若不入定碎如微塵問曰是舍利弗入何禪定力能如此答曰一切禪定力皆能如此若入金剛壁定三昧天魔外道毗舍闍鬼所不能近若欲近時天魔外道鬼神即自碎滅況復能打問曰一切禪定無受念心云何舍利弗入大禪定毗舍闍打頭皮少異答曰令後人知禪定力故作此問留名後世引導衆生是名菩薩自在禪定菩薩復有自在禪定若入禪定若出禪定行住坐臥身心無定無亂常能示現一切佛事上人能覺下人不如是名菩薩自在禪定問曰衆生六識是生死識不是智慧涅槃經云依智不依識今此意識是何等識而能如是種種巧用智慧無差答曰一切衆生用智有異不得一等愚癡凡夫用六情識初心菩薩用二種識一者轉識名為覺慧覺了諸法慧解無方二者名為藏識湛然不變西國云阿梨耶識此土名為佛性亦名自性清淨藏亦名如來藏若就隨事名智慧性覺了諸法時名為自性清淨心識之與心二用各別凡夫六識名為分張識隨業受報天人諸趣菩薩轉名第七識能轉一切生死惡業即是涅槃能覺凡夫六分張識令無變易即是藏識此第七識名金剛智能破一切無明煩惱生死結使即是佛法譬如健將降伏四方夷狄怨賊諸國弭伏皆作民子第七健識勇猛金剛決斷諸法亦復如是藏識者名第八識從生死際乃至佛道凡聖愚智未曾變易湛若虗空亦無垢淨生死涅槃無一無二雖假名亦不可得五根不能見無言能空何以故無空無無想亦無有無作不合亦不散亦相法亦無善惡虗空華解即會其如能了是聖人不了是惡夫法雖無一二愚智不共居不了是有為了者即無餘眠威儀臥品第四昏夜寢息當願衆生休息諸行心淨無穢身四威儀中眠臥最安樂菩薩涅槃臥諸行皆寂莫新學菩薩安穩臥時知一切法皆如臥相寂不動搖云何為安不危者為安夫安穩者何者是也不動不流名為安也何法不動何法不流所謂眼對色生貪愛必造諸行業貪愛為動行業為流隨業受報天人六趣豈非流也如大集經中佛告舍利弗因眼見色生貪愛者即是無明為愛造業名之為行至心專念名之為識由識造業遍行諸趣當觀此眼識在何處何者是根誰能見色色從何生精非是眼如清盲人眼精不壞根亦不破如好眼人不能見色生盲謝時即能見之然此盲法初無生處又無滅處盲法不自知我是盲能遮於色亦不作念不能遮色眼不自知我色法盲來遮我亦不作是念盲不遮我各不相知眼色亦爾何者是眼清自非眼童人亦非眼色亦非是眼精及中淚亦非是眼迬骨亦非是眼若一一是眼應有衆多眼無多眼故當知非一一是眼若共成一眼是義不然無和合故盲及衆緣一一皆空無有集散各無生滅空明亦然畢竟空寂如是觀時無多無一即無有眼亦無名字不斷不常無諸陰界無貪無愛亦無無明都無相貌如睡無夢都無所見明與無明俱不可得無行亦無識亦復如是亦無一切陰界諸入是故維摩經言所見色與盲等一切諸法畢竟不動不動者即是不流如人臥時一切事息都無思覺諸法亦爾是名安眠不動曰安不現曰隱寂滅為眼菩薩自覺復以此法覺悟衆生增長慧命是名眼義法施檀波羅蜜菩薩臥時善惡欲界不可得故亦以此法利益衆生是名持戒尸波羅蜜菩薩臥時一切陰界不動搖故自利及衆生是名忍辱羼提波羅蜜菩薩臥時一切陰界無生住滅自利及他是名精進毗利耶波羅蜜菩薩臥時一切陰界無定亂故能利衆生是名定智禪波羅蜜菩薩臥時一切陰界入如虗空華無決定相能利一切法界衆生畢竟解脫皆得菩提亦悉具足行住坐義菩薩雖眠應化普現無量法界一切威儀衆生感皆得稱機安穩而臥同證涅槃萬行休息如人睡眠是名菩薩眠義中般若波羅蜜耳鼻舌身意亦復如是同上三威儀不復更重廣說食威儀中具足一切諸上味品第五菩薩得飲食時先應呪願兩手合掌心念一切十方凡聖而作是言此食色香味上獻十方佛中奉諸賢聖下及六道品等施無前後隨感皆飽滿令諸施主得無量波羅蜜若得食時當願衆生得禪悅食無餘味想若得食時當願衆生得法喜食甘露味想噉飲食時當願衆生餐涅槃飯到彼岸想飯食已訖當願衆生種智圓滿覺衆生想澡𡃤飲訖當願衆生妙覺常住湛然明淨新學菩薩得飲食時一心受食無雜念想念時香氣如旃檀風一時普遍十方世界凡聖隨感各得上味凡夫聞香發菩提心餓鬼聞香一時飽滿捨餓鬼身發菩提心畜生聞香即得飽滿捨禽獸形發菩提心地獄聞香捨地獄苦得人天身發菩提心是名菩薩受飲食時布施一切檀波羅蜜施者受者色香味觸空無生滅是名法施檀波羅蜜新學菩薩已所受食色香美味熏諸行人皆得法喜離五怖畏是無畏施檀波羅蜜新學菩薩已所受食色香美味施飲食時不觀衆生持戒破戒但觀法性無差別想能令衆生罪福心息是名淨戒畢竟解脫平等三昧尸波羅蜜新學菩薩已所施食色香美味能令衆生聞香心定得不動味深達實相離我淨心具足忍辱羼波羅蜜新學菩薩以食施時觀此施心無生住滅所施飲食及以受者無生住滅離陰界入能令衆生聞香飽足離三想心得不住法亦無去來是名精進具毗梨耶諸波羅蜜新學菩薩受飲食時觀前施主施食之心無生無滅非內非外亦非中間亦無定亂畢竟寂滅亦無滅想亦無無滅我受食心亦如施主於食食心同一無二一切衆生受我施者我及衆心所施飲食三事皆空與前施主等一法性無施無受無飲食想能令衆生善根增長菩薩身心雖常在定能令十方一時普現衆生隨機隨感即現及聞說法稱機得道知煩惱性即是菩提是名寂定禪波羅蜜新學菩薩受飲食時觀陰界入誰見飲食誰受此食食不自知我是飲食我非飲食亦不自知我無我所亦無食言菩薩受我及以不受新學菩薩如是觀時無一切受亦無不受知飲食性不曾動搖得不動智入如來智施者受者及見食者皆如食性不曾動搖得不動智亦能如實知一切法是名如實如來實智所以者何如經中說佛世尊問鴦掘魔羅云何一學鴦掘答佛夫一學者名之曰淨如來戒也非是二乘聲聞緣覺所持戒也如偈中說鴦掘魔羅復答佛言今當分別大小乘意一切衆生命皆依飲食住此即聲聞乘非是摩訶衍所謂摩訶衍雖食常堅固云何名為一謂一切衆生皆以如來藏畢竟恆安住新學菩薩如此觀時凡夫聖人本末究竟平等無二亦能善達凡聖始終究竟一乘差別之相亦如色入法界海說色入法界海者即是色藏法界海色藏法界者即是識入法界海識入法界海者即是識藏法界海智入法界海者即是智藏法界海亦得名為色集法界海識集法界海智集法界海佛與凡夫一切具足名本末究竟平等此法身藏唯佛與佛乃能知之法華經中總說難見華嚴中分別易解是名菩薩受食施食性雖空寂具足中道智慧藏亦名色心神通之藏是名摩訶衍摩訶般若波羅蜜受食施食具足此義一念一時色心音聲普遍十方一切世界能令三乘各獲其道通達大智到於彼岸如上所說語威儀品第六語威儀中具足一切上妙巧音聲普應衆心稱機品新學菩薩若欲語時先起慈悲孝順之心靜心正念一切音聲一時普遍十方凡聖所聞不同以此音聲普興供養聖人唯聞歌詠讚嘆十方菩薩同音讚佛修羅彈琴乾闥作樂天龍雨華衆妙供具四事具足供養諸佛及大菩薩一切衆聖等無差別天人六道聞三種聲一者軟美語聲二者苦切語聲摧伏剛強衆生三者雜語隨時調伏無決定聲菩薩一語能感衆聲不先思惟應時自發對機稱情無礙辨才力能如此知人天聞之離欲得道四趣聞之離苦得樂發菩提心新學菩薩觀語而有聲出支原觀之咽喉舌齒都無聲相何以故求和合者不可得故唇非是聲齒亦非聲咽喉及舌亦非是聲頰骨及愕亦非是聲一一緣中求聲不得咽喉舌齒各不相知性無和合亦無散滅知此音聲如空中響非斷非常亦無生滅都無相貌復觀念心為在何處相貌何似如此觀時知此念心非外亦非中間猶如虗空都無相貌無得故無語無語名字是名語無作解脫門雖無語者能以一語普現衆聲一語一時現無量語何故能爾由本誓願大慈悲心為衆生故一語能現無量音聲衆生感聞各各不同解脫亦然誓願慈悲力能如此非但一語一時能現無量音聲色身普現十方世界對衆生眼色像不同隨機感悟一時得道所以者何新學菩薩以本誓願不惜身命護佛正法大精進力不退轉力念衆生身以大慈悲欲度衆生凡所言說粗言軟語苦切雜語皆能利益無量衆生如佛仙所說粗言及軟語衆解音不同皆歸第一義一切國土中衆生相殺害菩薩現於世降伏使和安或為人天王或為國大臣或現作猛將方便摧惡人四方怨歒息國豐使民安或現行十善方便化衆生或作邑中主造像及造經開門廣布施方便化衆生或現作沙門持戒不惜身廣說三乘教方便度衆生或現作童始學初發心或現又修學朽老過百年或現在城邑或現入深山或現行瞋腦方便引衆生或現作四衆或稱是聲聞或稱辟支佛或為無上尊新學諸菩薩一音現衆聲一色無量形方便對衆生忍辱慈悲力誓願應衆生禪定神通力普現衆色爾新學菩薩以大慈悲誓願力故方便慈愍諸衆生故凡所言說衆生聞之皆得正信發菩提心是名法施波羅蜜新學菩薩以隨自意三昧力故一切語時能令衆生聞者覺悟深達法性離空假心亦無斷常見諸衆生持戒毀戒性無垢淨無罪無福相亦能持戒不惜身命新學菩薩誓功德力利益如是無量衆生是名持戒尸波羅蜜新學菩薩欲說法時以此法性無名三昧衆生聞者心想寂滅得不動三昧是名忍辱羼提波羅蜜新學菩薩若說法時粗言軟語性皆平等無生住滅衆生聞者得無住三昧是名精進毗梨耶波羅蜜新學菩薩說法語言一語雖現無量音聲心無定亂能令衆生聞者解悟發菩提心得不動三昧是名寂定禪波羅蜜新學菩薩說法語言衆生聞者離陰入具足辨才無量智慧如身如影如夢如化如雲如幻無所得故得寶幢三昧即能具足一切三昧獲得辨才陀羅尼門通達一切凡聖彼岸是名菩薩語威儀具足摩訶般若波羅蜜
